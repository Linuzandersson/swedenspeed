<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Tuningdelar Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* HEADER */
header {
    background: black;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid red;
}

/* NAV */
nav {
    background: #1a1a1a;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

/* CART */
#cart {
    position: fixed;
    right: 0;
    top: 0;
    width: 250px;
    height: 100%;
    background: #222;
    padding: 15px;
    overflow-y: auto;
    border-left: 2px solid red;
}

#cart h2 {
    text-align: center;
}

.cart-item {
    border-bottom: 1px solid #444;
    margin-bottom: 10px;
    padding-bottom: 10px;
}

/* PRODUCTS */
.container {
    margin-right: 270px;
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.product {
    background: #1f1f1f;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.price {
    color: #00ff88;
    font-weight: bold;
}

button {
    background: red;
    border: none;
    padding: 10px;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}
</style>

</head>

<body>

<header>
<h1>🚗 Tuningdelar Shop</h1>
<p>Bygg din drömbil</p>
</header>

<nav>
<a href="#">Avgassystem</a>
<a href="#">Spoilers</a>
<a href="#">LED</a>
<a href="#">Fälgar</a>
</nav>

<!-- VARUKORG -->
<div id="cart">
<h2>🛒 Varukorg</h2>
<div id="cart-items"></div>
<p>Total: <span id="total">0</span> kr</p>
</div>

<div class="container">

<h2>Produkter</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
<h3>Sportavgassystem</h3>
<p class="price">2999</p>
<button onclick="addToCart('Sportavgassystem', 2999)">Köp</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
<h3>Bakspoiler</h3>
<p class="price">1499</p>
<button onclick="addToCart('Bakspoiler', 1499)">Köp</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>LED Ramp</h3>
<p class="price">899</p>
<button onclick="addToCart('LED Ramp', 899)">Köp</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1542362567-b07e54358753">
<h3>Sportfälgar</h3>
<p class="price">4999</p>
<button onclick="addToCart('Sportfälgar', 4999)">Köp</button>
</div>

</div>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    let cartDiv = document.getElementById("cart-items");
    cartDiv.innerHTML = "";

    cart.forEach((item, index) => {
        cartDiv.innerHTML += `
            <div class="cart-item">
                ${item.name} - ${item.price} kr
                <br>
                <button onclick="removeItem(${index})">Ta bort</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;
}

function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    updateCart();
}
</script>

</body>
</html>
